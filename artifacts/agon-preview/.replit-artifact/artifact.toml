kind = "mobile"
previewPath = "/"
title = "Agon Preview"
version = "1.0.0"
id = "artifacts/agon-preview"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22753

[services.development]
run = "pnpm --filter @workspace/agon-preview run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agon-preview", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/agon-preview", "run", "serve" ]

[services.env]
PORT = "22753"
BASE_PATH = "/"
